<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent-hover: #7dd3fc;
            --border: #334155;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); text-decoration: underline; }

        /* Navigation */
        .navbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .navbar-brand:hover { text-decoration: none; color: var(--accent-hover); }
        .navbar-nav {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }
        .navbar-nav a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .navbar-nav a:hover { color: var(--text-primary); text-decoration: none; }
        .nav-search {
            margin-left: auto;
            display: flex;
            gap: 0.5rem;
        }
        .nav-search input {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
            width: 220px;
        }
        .nav-search input::placeholder { color: var(--text-secondary); }
        .nav-search button {
            background: var(--accent);
            color: var(--bg-primary);
            border: none;
            padding: 0.4rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.85rem;
            min-width: 44px;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-search button:hover { background: var(--accent-hover); }

        /* Main content */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .card-header {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: var(--bg-primary);
            color: var(--text-secondary);
            text-align: left;
            padding: 0.6rem 0.75rem;
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }
        td {
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }
        tr:hover { background: rgba(56, 189, 248, 0.05); }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .badge-expired { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .badge-service { background: rgba(56, 189, 248, 0.2); color: var(--accent); }

        /* Map */
        #map {
            height: calc(100vh - 60px);
            width: 100%;
        }
        .map-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .map-sidebar {
            width: 380px;
            min-width: 380px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            padding: 1rem;
            transition: width 0.3s ease, min-width 0.3s ease;
        }
        .map-sidebar.collapsed {
            width: 50px;
            min-width: 50px;
            padding: 1rem 0.5rem;
            overflow: hidden;
        }
        .map-main {
            flex: 1;
        }

        /* Filter form */
        .filter-group {
            margin-bottom: 0.75rem;
        }
        .filter-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-group input,
        .filter-group select {
            width: 100%;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .filter-group select { cursor: pointer; }
        .filter-row {
            display: flex;
            gap: 0.5rem;
        }
        .filter-row > * { flex: 1; }

        .btn {
            display: inline-block;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .btn-outline:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
        }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.8rem; }

        /* Pagination */
        .pagination {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            justify-content: center;
        }
        .pagination a, .pagination span {
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
        }
        .pagination a {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }
        .pagination a:hover {
            color: var(--text-primary);
            border-color: var(--accent);
            text-decoration: none;
        }
        .pagination .active {
            background: var(--accent);
            color: var(--bg-primary);
            font-weight: 600;
        }

        /* Breadcrumb */
        .breadcrumb {
            display: flex;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .breadcrumb a { color: var(--accent); }
        .breadcrumb .sep { color: var(--text-secondary); }

        /* Detail info */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .info-item label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .info-item .value {
            font-size: 1rem;
            font-weight: 500;
        }

        /* Grid layout for browse */
        .state-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        .state-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            transition: border-color 0.2s;
        }
        .state-card:hover {
            border-color: var(--accent);
            text-decoration: none;
        }
        .state-card .name {
            font-weight: 600;
            color: var(--text-primary);
        }
        .state-card .count {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        /* Frequency highlight */
        .freq { color: var(--warning); font-weight: 600; font-family: monospace; }

        /* Spinner */
        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline-block;
        }
        .spinner {
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 768px) {
            body { font-size: 16px; }
            .map-container { flex-direction: column; height: auto; }
            .map-sidebar { width: 100%; min-width: auto; max-height: 50vh; border-right: none; border-bottom: 1px solid var(--border); }
            #map { height: 50vh; width: 100%; }
            .navbar { gap: 0.5rem; flex-wrap: wrap; padding: 0.75rem; }
            .navbar-nav { gap: 1rem; }
            .nav-search { width: 100%; margin-left: 0; }
            .nav-search input { flex: 1; font-size: 1rem; padding: 0.75rem; }
            .nav-search button { min-height: 44px; }
            .state-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            .container { padding: 1rem; }
            .card { padding: 1rem; }
            table { font-size: 0.8rem; }
            .filter-group input, .filter-group select { font-size: 1rem; padding: 0.75rem; height: 44px; }
            .btn { padding: 0.75rem 1.25rem; font-size: 1rem; min-height: 44px; }
            .info-grid { grid-template-columns: 1fr; }
        }
        
        /* Tablet */
        @media (min-width: 769px) and (max-width: 1024px) {
            .navbar { gap: 1.5rem; }
            .state-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">
            FCC Transmitter Map
        </a>
        <ul class="navbar-nav">
            <li><a href="/">Map</a></li>
            <li><a href="/browse">Browse</a></li>
            <li><a href="/search">Search</a></li>
            <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdY_LvssIEvTDqzn8cRq15EZQboCxVNfcIE2CiJ-6aBid_Kvg/viewform?usp=publish-editor" target="_blank" rel="noopener noreferrer">Report Bug</a></li>
        </ul>
        <form class="nav-search" action="/search" method="get">
            <input type="text" name="q" placeholder="Callsign or licensee..." />
            <button type="submit">Search</button>
        </form>
    </nav>

    {% block content %}{% endblock %}

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
